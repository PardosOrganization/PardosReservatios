---
- name: Build y push de imagenes a AWS ECR (Pardos)
  hosts: local
  gather_facts: false
  vars_files:
    - "group_vars/all.yml"
    - "group_vars/{{ env | default('prod') }}.yml"
  vars:
    image_tag: "{{ lookup('pipe', 'git rev-parse --short HEAD') }}"
  tasks:
    - name: Obtener Account ID de AWS
      ansible.builtin.command: aws sts get-caller-identity --query Account --output text
      register: aws_account
      changed_when: false

    - name: Definir registry de ECR
      ansible.builtin.set_fact:
        ecr_registry: "{{ aws_account.stdout }}.dkr.ecr.{{ aws_region }}.amazonaws.com"

    - name: Login a ECR
      ansible.builtin.shell: |
        set -o pipefail
        aws ecr get-login-password --region {{ aws_region }} \
          | docker login --username AWS --password-stdin {{ ecr_registry }}
      args:
        executable: /bin/bash
      changed_when: true
      when: false # Omitido en CI/CD (ya logueado por GHA)

    - name: Build de la imagen por microservicio
      ansible.builtin.command: >
        docker build
        -t {{ ecr_registry }}/{{ project }}-{{ env }}-svc-{{ item }}:{{ image_tag }}
        {{ playbook_dir }}/../apps/backend/{{ item }}
      loop: "{{ microservices }}"
      when: false # Omitido en CI/CD (ya compilado y subido por GHA)

    - name: Push de la imagen a ECR
      ansible.builtin.command: >
        docker push {{ ecr_registry }}/{{ project }}-{{ env }}-svc-{{ item }}:{{ image_tag }}
      loop: "{{ microservices }}"
      when: false # Omitido en CI/CD (ya subido por GHA)

    # --- Actualizacion de ECS ---
    - name: Verificar si el cluster de ECS existe en AWS
      ansible.builtin.command: >
        aws ecs describe-clusters
        --clusters {{ project }}-{{ env }}-cluster
        --region {{ aws_region }}
        --query "clusters[0].status"
        --output text
      register: ecs_cluster_status
      changed_when: false
      failed_when: false

    - name: Definir si se debe desplegar a ECS
      ansible.builtin.set_fact:
        should_deploy_ecs: "{{ ecs_cluster_status.stdout | default('') | trim != 'None' and ecs_cluster_status.stdout | default('') | trim != '' }}"

    - name: Verificar la existencia de cada servicio ECS en el cluster
      ansible.builtin.command: >
        aws ecs describe-services
        --cluster {{ project }}-{{ env }}-cluster
        --services svc-{{ item }}
        --region {{ aws_region }}
        --query "services[0].status"
        --output text
      loop: "{{ microservices }}"
      register: service_checks
      changed_when: false
      failed_when: false
      when: should_deploy_ecs

    - name: Generar definicion de tarea (Task Definition) desde plantilla Jinja2
      ansible.builtin.template:
        src: task-definition.json.j2
        dest: "/tmp/td-new-{{ item.item }}.json"
      loop: "{{ service_checks.results | default([]) }}"
      when:
        - should_deploy_ecs
        - item.stdout is defined
        - item.stdout | trim != 'None'
        - item.stdout | trim != ''
        - item.stdout | trim != 'MISSING'

    - name: Registrar nueva revision de la task definition
      ansible.builtin.shell: |
        aws ecs register-task-definition --cli-input-json file:///tmp/td-new-{{ item.item }}.json --region {{ aws_region }}
      args:
        executable: /bin/bash
      loop: "{{ service_checks.results | default([]) }}"
      when:
        - should_deploy_ecs
        - item.stdout is defined
        - item.stdout | trim != 'None'
        - item.stdout | trim != ''
        - item.stdout | trim != 'MISSING'

    - name: Forzar nuevo despliegue del servicio ECS
      ansible.builtin.command: >
        aws ecs update-service
        --cluster {{ project }}-{{ env }}-cluster
        --service svc-{{ item.item }}
        --task-definition {{ project }}-{{ env }}-svc-{{ item.item }}
        --force-new-deployment
        --region {{ aws_region }}
      loop: "{{ service_checks.results | default([]) }}"
      when:
        - should_deploy_ecs
        - item.stdout is defined
        - item.stdout | trim != 'None'
        - item.stdout | trim != ''
        - item.stdout | trim != 'MISSING'
