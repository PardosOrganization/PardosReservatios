name: CD Push to ECR and Deploy to ECS
# Trigger rebuild: repositorios ECR de dev creados exitosamente

on:
  workflow_call:

env:
  AWS_REGION: us-east-1
  TARGET_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

jobs:

  # JOB 1: Build, tag y push de microservicios a ECR
  push-backend:
    name: Push Backend ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [anfitriona, mozo, caja, cocina]
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Notificar Inicio de Push Backend a Loki
        run: |
          TIMESTAMP=$(date +%s%N)
          BODY=$(jq -n --arg ts "$TIMESTAMP" --arg msg "[CD] [START] Iniciando push de backend a ECR: ${{ matrix.service }}..." '{"streams": [{"stream": {"env": "${{ env.TARGET_ENV }}", "service": "github-actions", "event": "start", "component": "backend", "microservice": "${{ matrix.service }}"}, "values": [[$ts, $msg]]}]}')
          curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y Push a ECR svc-${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: apps/backend/${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/pardos-${{ env.TARGET_ENV }}-svc-${{ matrix.service }}:${{ github.sha }}
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/pardos-${{ env.TARGET_ENV }}-svc-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Notificar Exito de Push Backend a Loki
        if: success()
        run: |
          TIMESTAMP=$(date +%s%N)
          BODY=$(jq -n --arg ts "$TIMESTAMP" --arg msg "[CD] [SUCCESS] Backend ${{ matrix.service }} subido con exito a ECR." '{"streams": [{"stream": {"env": "${{ env.TARGET_ENV }}", "service": "github-actions", "event": "success", "component": "backend", "microservice": "${{ matrix.service }}"}, "values": [[$ts, $msg]]}]}')
          curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push

      - name: Notificar Fallo de Push Backend a Loki
        if: failure()
        run: |
          TIMESTAMP=$(date +%s%N)
          BODY=$(jq -n --arg ts "$TIMESTAMP" --arg msg "[CD] [ERROR] Fallo la subida de backend ${{ matrix.service }} a ECR." '{"streams": [{"stream": {"env": "${{ env.TARGET_ENV }}", "service": "github-actions", "event": "failure", "component": "backend", "microservice": "${{ matrix.service }}"}, "values": [[$ts, $msg]]}]}')
          curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push
  # JOB 2: Compilación y despliegue de frontends a S3
  push-frontend:
    name: Deploy Frontend ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: landing-page
            bucket_suffix: frontend
            s3_path: /
          - app: reservation-system
            bucket_suffix: empleados
            s3_path: /empleados/
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Notificar Inicio de Despliegue Frontend a Loki
        run: |
          TIMESTAMP=$(date +%s%N)
          BODY=$(jq -n --arg ts "$TIMESTAMP" --arg msg "[CD] [START] Iniciando despliegue de frontend: ${{ matrix.app }} a S3..." '{"streams": [{"stream": {"env": "${{ env.TARGET_ENV }}", "service": "github-actions", "event": "start", "component": "frontend", "app": "${{ matrix.app }}"}, "values": [[$ts, $msg]]}]}')
          curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - name: Instalar dependencias del Frontend
        run: npm ci
        working-directory: apps/${{ matrix.app }}

      - name: Compilar Frontend
        run: npm run build
        working-directory: apps/${{ matrix.app }}

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Subir archivos a S3
        run: |
          BUCKET_NAME="pardos-${{ matrix.bucket_suffix }}-${{ env.TARGET_ENV }}"
          aws s3 sync dist/ s3://$BUCKET_NAME${{ matrix.s3_path }} --delete
        working-directory: apps/${{ matrix.app }}

      - name: Invalidar cache de CloudFront
        run: |
          DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Comment=='pardos-${{ env.TARGET_ENV }} CDN'].Id" --output text)
          if [ "$DIST_ID" != "None" ] && [ -n "$DIST_ID" ]; then
            aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "${{ matrix.s3_path }}*"
          fi

      - name: Notificar Exito de Despliegue Frontend a Loki
        if: success()
        run: |
          TIMESTAMP=$(date +%s%N)
          BODY=$(jq -n --arg ts "$TIMESTAMP" --arg msg "[CD] [SUCCESS] Frontend ${{ matrix.app }} desplegado con exito a S3 e invalidado en CloudFront." '{"streams": [{"stream": {"env": "${{ env.TARGET_ENV }}", "service": "github-actions", "event": "success", "component": "frontend", "app": "${{ matrix.app }}"}, "values": [[$ts, $msg]]}]}')
          curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push

      - name: Notificar Fallo de Despliegue Frontend a Loki
        if: failure()
        run: |
          TIMESTAMP=$(date +%s%N)
          BODY=$(jq -n --arg ts "$TIMESTAMP" --arg msg "[CD] [ERROR] Fallo el despliegue del frontend ${{ matrix.app }} a S3." '{"streams": [{"stream": {"env": "${{ env.TARGET_ENV }}", "service": "github-actions", "event": "failure", "component": "frontend", "app": "${{ matrix.app }}"}, "values": [[$ts, $msg]]}]}')
          curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push

  # JOB 3: Despliegue a ECS via Ansible
  deploy-ecs:
    name: Ansible Deploy to ECS
    runs-on: ubuntu-latest
    needs: [push-backend, push-frontend]
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Notificar Inicio de Despliegue a Loki
        run: |
          TIMESTAMP=$(date +%s%N)
          BODY=$(jq -n --arg ts "$TIMESTAMP" --arg msg "[CD] [DEPLOY] Iniciando despliegue de servicios a ECS (Ansible)..." '{"streams": [{"stream": {"env": "${{ env.TARGET_ENV }}", "service": "github-actions", "event": "deploy_start"}, "values": [[$ts, $msg]]}]}')
          curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Instalar Python y Ansible
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-pip
          pip install ansible boto3 botocore

      - name: Ejecutar playbook de despliegue
        run: |
          ansible-playbook -i ansible/hosts.ini ansible/deploy-services.yml \
            -e "env=${{ env.TARGET_ENV }}" \
            -e "image_tag=${{ github.sha }}" > ansible.log 2>&1 || (
              TIMESTAMP=$(date +%s%N)
              ERR_TEXT=$(tail -n 20 ansible.log)
              BODY=$(jq -n --arg ts "$TIMESTAMP" --arg err "[CD] [ERROR] Ansible deploy failed:\n$ERR_TEXT" '{"streams": [{"stream": {"env": "${{ env.TARGET_ENV }}", "service": "github-actions", "event": "failure"}, "values": [[$ts, $err]]}]}')
              curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push
              exit 1
            )
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Notificar Exito de Despliegue a Loki
        if: success()
        run: |
          TIMESTAMP=$(date +%s%N)
          BODY=$(jq -n --arg ts "$TIMESTAMP" --arg msg "[CD] [SUCCESS] Despliegue completado con exito a ECS (Version: ${{ github.sha }})." '{"streams": [{"stream": {"env": "${{ env.TARGET_ENV }}", "service": "github-actions", "event": "success"}, "values": [[$ts, $msg]]}]}')
          curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push

      - name: Notificar Fallo de Despliegue a Loki
        if: failure()
        run: |
          TIMESTAMP=$(date +%s%N)
          BODY=$(jq -n --arg ts "$TIMESTAMP" --arg msg "[CD] [ERROR] Fallo el despliegue a ECS (Ansible)." '{"streams": [{"stream": {"env": "${{ env.TARGET_ENV }}", "service": "github-actions", "event": "failure"}, "values": [[$ts, $msg]]}]}')
          curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push
