name: CD Push to ECR and Deploy to ECS

on:
  workflow_call:

env:
  AWS_REGION: us-east-1

jobs:
  # JOB 1: Detección dinámica de entorno
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    outputs:
      target_env: ${{ steps.set-env.outputs.target_env }}
      tfvars_file: ${{ steps.set-env.outputs.tfvars_file }}
    steps:
      - name: Determine Environment
        id: set-env
        run: |
          REF="${{ github.ref }}"
          if [[ "$REF" == "refs/heads/main" ]]; then
            echo "target_env=prod" >> $GITHUB_OUTPUT
            echo "tfvars_file=prod.tfvars" >> $GITHUB_OUTPUT
          elif [[ "$REF" == "refs/heads/qa" ]]; then
            echo "target_env=qa" >> $GITHUB_OUTPUT
            echo "tfvars_file=qa.tfvars" >> $GITHUB_OUTPUT
          else
            echo "target_env=dev" >> $GITHUB_OUTPUT
            echo "tfvars_file=dev.tfvars" >> $GITHUB_OUTPUT
          fi

  # JOB 2: Despliegue de infraestructura con Terraform
  deploy-infra:
    name: Deploy Infrastructure (Terraform)
    runs-on: ubuntu-latest
    needs: setup
    env:
      TARGET_ENV: ${{ needs.setup.outputs.target_env }}
      TF_VARS_FILE: ${{ needs.setup.outputs.tfvars_file }}
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ">=1.6.0"

      - name: Terraform Init y Apply
        run: |
          cd IAC
          terraform init
          terraform workspace select $TARGET_ENV || terraform workspace new $TARGET_ENV
          terraform apply -target=aws_s3_bucket.frontend -target=aws_ecr_repository.this -target=aws_ecr_repository.loki -var-file=$TF_VARS_FILE -auto-approve

  # JOB 3: Build, tag y push de microservicios a ECR
  push-backend:
    name: Push Backend ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [setup, deploy-infra]
    env:
      TARGET_ENV: ${{ needs.setup.outputs.target_env }}
    strategy:
      fail-fast: false
      matrix:
        service: [anfitriona, mozo, caja, cocina]
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Notificar Inicio de Push Backend a Loki
        run: |
          TIMESTAMP=$(date +%s%N)
          BODY=$(jq -n --arg ts "$TIMESTAMP" --arg msg "[CD] [START] Iniciando push de backend a ECR: ${{ matrix.service }}..." '{"streams": [{"stream": {"env": "${{ env.TARGET_ENV }}", "service": "github-actions", "event": "start", "component": "backend", "microservice": "${{ matrix.service }}"}, "values": [[$ts, $msg]]}]}')
          curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y Push a ECR svc-${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: apps/backend/${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/pardos-${{ env.TARGET_ENV }}-svc-${{ matrix.service }}:${{ github.sha }}
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/pardos-${{ env.TARGET_ENV }}-svc-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Notificar Exito de Push Backend a Loki
        if: success()
        run: |
          TIMESTAMP=$(date +%s%N)
          BODY=$(jq -n --arg ts "$TIMESTAMP" --arg msg "[CD] [SUCCESS] Backend ${{ matrix.service }} subido con exito a ECR." '{"streams": [{"stream": {"env": "${{ env.TARGET_ENV }}", "service": "github-actions", "event": "success", "component": "backend", "microservice": "${{ matrix.service }}"}, "values": [[$ts, $msg]]}]}')
          curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push

      - name: Notificar Fallo de Push Backend a Loki
        if: failure()
        run: |
          TIMESTAMP=$(date +%s%N)
          BODY=$(jq -n --arg ts "$TIMESTAMP" --arg msg "[CD] [ERROR] Fallo la subida de backend ${{ matrix.service }} a ECR." '{"streams": [{"stream": {"env": "${{ env.TARGET_ENV }}", "service": "github-actions", "event": "failure", "component": "backend", "microservice": "${{ matrix.service }}"}, "values": [[$ts, $msg]]}]}')
          curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push

  # JOB 3b: Build, tag y push de la imagen de Loki (config S3 horneada) a ECR
  push-loki:
    name: Push Loki
    runs-on: ubuntu-latest
    needs: [setup, deploy-infra]
    env:
      TARGET_ENV: ${{ needs.setup.outputs.target_env }}
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y Push a ECR loki
        uses: docker/build-push-action@v5
        with:
          context: observability/loki
          push: true
          tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/pardos-${{ env.TARGET_ENV }}-loki:${{ github.sha }}
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/pardos-${{ env.TARGET_ENV }}-loki:latest
          cache-from: type=gha,scope=loki
          cache-to: type=gha,mode=max,scope=loki

      - name: Redesplegar servicio Loki en ECS
        run: |
          aws ecs update-service \
            --cluster pardos-${{ env.TARGET_ENV }}-cluster \
            --service loki \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Notificar Exito de Push Loki a Loki
        if: success()
        run: |
          TIMESTAMP=$(date +%s%N)
          BODY=$(jq -n --arg ts "$TIMESTAMP" --arg msg "[CD] [SUCCESS] Imagen de Loki con almacenamiento S3 desplegada." '{"streams": [{"stream": {"env": "${{ env.TARGET_ENV }}", "service": "github-actions", "event": "success", "component": "loki"}, "values": [[$ts, $msg]]}]}')
          curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push

  # JOB 4: Compilación y despliegue de frontends a S3
  push-frontend:
    name: Deploy Frontend ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: [setup, deploy-infra]
    env:
      TARGET_ENV: ${{ needs.setup.outputs.target_env }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: landing-page
            bucket_suffix: frontend
            s3_path: /
          - app: reservation-system
            bucket_suffix: empleados
            s3_path: /empleados/
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Notificar Inicio de Despliegue Frontend a Loki
        run: |
          TIMESTAMP=$(date +%s%N)
          BODY=$(jq -n --arg ts "$TIMESTAMP" --arg msg "[CD] [START] Iniciando despliegue de frontend: ${{ matrix.app }} a S3..." '{"streams": [{"stream": {"env": "${{ env.TARGET_ENV }}", "service": "github-actions", "event": "start", "component": "frontend", "app": "${{ matrix.app }}"}, "values": [[$ts, $msg]]}]}')
          curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - name: Instalar dependencias del Frontend
        run: npm ci
        working-directory: apps/${{ matrix.app }}

      - name: Compilar Frontend
        run: npm run build
        working-directory: apps/${{ matrix.app }}

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Subir archivos a S3
        run: |
          BUCKET_NAME="pardos-${{ matrix.bucket_suffix }}-${{ env.TARGET_ENV }}"
          aws s3 sync dist/ s3://$BUCKET_NAME${{ matrix.s3_path }} --delete
        working-directory: apps/${{ matrix.app }}

      - name: Invalidar cache de CloudFront
        run: |
          DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Comment=='pardos-${{ env.TARGET_ENV }} CDN'].Id" --output text)
          if [ "$DIST_ID" != "None" ] && [ -n "$DIST_ID" ]; then
            aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "${{ matrix.s3_path }}*"
          fi

      - name: Notificar Exito de Despliegue Frontend a Loki
        if: success()
        run: |
          TIMESTAMP=$(date +%s%N)
          BODY=$(jq -n --arg ts "$TIMESTAMP" --arg msg "[CD] [SUCCESS] Frontend ${{ matrix.app }} desplegado con exito a S3 e invalidado en CloudFront." '{"streams": [{"stream": {"env": "${{ env.TARGET_ENV }}", "service": "github-actions", "event": "success", "component": "frontend", "app": "${{ matrix.app }}"}, "values": [[$ts, $msg]]}]}')
          curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push

      - name: Notificar Fallo de Despliegue Frontend a Loki
        if: failure()
        run: |
          TIMESTAMP=$(date +%s%N)
          BODY=$(jq -n --arg ts "$TIMESTAMP" --arg msg "[CD] [ERROR] Fallo el despliegue del frontend ${{ matrix.app }} a S3." '{"streams": [{"stream": {"env": "${{ env.TARGET_ENV }}", "service": "github-actions", "event": "failure", "component": "frontend", "app": "${{ matrix.app }}"}, "values": [[$ts, $msg]]}]}')
          curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push

  # JOB 5: Despliegue a ECS via Ansible
  deploy-ecs:
    name: Ansible Deploy to ECS
    runs-on: ubuntu-latest
    needs: [setup, push-backend, push-frontend]
    env:
      TARGET_ENV: ${{ needs.setup.outputs.target_env }}
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Notificar Inicio de Despliegue a Loki
        run: |
          TIMESTAMP=$(date +%s%N)
          BODY=$(jq -n --arg ts "$TIMESTAMP" --arg msg "[CD] [DEPLOY] Iniciando despliegue de servicios a ECS (Ansible)..." '{"streams": [{"stream": {"env": "${{ env.TARGET_ENV }}", "service": "github-actions", "event": "deploy_start"}, "values": [[$ts, $msg]]}]}')
          curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Instalar Python y Ansible
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-pip
          pip install ansible boto3 botocore

      - name: Ejecutar playbook de despliegue
        run: |
          ansible-playbook -i ansible/hosts.ini ansible/deploy-services.yml \
            --extra-vars "env=$TARGET_ENV image_tag=${{ github.sha }}" > ansible.log 2>&1 || (
              TIMESTAMP=$(date +%s%N)
              echo "=== full ansible.log output ==="
              cat ansible.log
              echo "==============================="
              ERR_TEXT=$(tail -n 20 ansible.log)
              BODY=$(jq -n --arg ts "$TIMESTAMP" --arg err "[CD] [ERROR] Ansible deploy failed:\n$ERR_TEXT" '{"streams": [{"stream": {"env": "'$TARGET_ENV'", "service": "github-actions", "event": "failure"}, "values": [[$ts, $err]]}]}')
              curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push
              exit 1
            )
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Notificar Exito de Despliegue a Loki
        if: success()
        run: |
          TIMESTAMP=$(date +%s%N)
          BODY=$(jq -n --arg ts "$TIMESTAMP" --arg msg "[CD] [SUCCESS] Despliegue completado con exito a ECS (Version: ${{ github.sha }})." '{"streams": [{"stream": {"env": "${{ env.TARGET_ENV }}", "service": "github-actions", "event": "success"}, "values": [[$ts, $msg]]}]}')
          curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push

      - name: Notificar Fallo de Despliegue a Loki
        if: failure()
        run: |
          TIMESTAMP=$(date +%s%N)
          BODY=$(jq -n --arg ts "$TIMESTAMP" --arg msg "[CD] [ERROR] Fallo el despliegue a ECS (Ansible)." '{"streams": [{"stream": {"env": "${{ env.TARGET_ENV }}", "service": "github-actions", "event": "failure"}, "values": [[$ts, $msg]]}]}')
          curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push

  # JOB 6: Promoción automática en cascada
  promote-branch:
    name: Promote Branch in Cascade
    runs-on: ubuntu-latest
    needs: [setup, deploy-ecs]
    if: |
      success() &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/qa')
    steps:
      - name: Checkout target branch (qa or main)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AUTO_MERGE_TOKEN || github.token }}
          fetch-depth: 0

      - name: Configurar Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge and Promote
        run: |
          REF="${{ github.ref }}"
          if [[ "$REF" == "refs/heads/develop" ]]; then
            echo "Promoting develop to qa..."
            git checkout qa
            git merge ${{ github.sha }} -m "chore: auto-merge develop into qa"
            git push origin qa
          elif [[ "$REF" == "refs/heads/qa" ]]; then
            echo "Promoting qa to main..."
            git checkout main
            git merge ${{ github.sha }} -m "chore: auto-merge qa into main"
            git push origin main
          fi
