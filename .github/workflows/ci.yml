name: CI â€” Lint, Validate & Build

on:
  push:
     branches: [main, develop, "feat/*"]
  pull_request:
    branches: [main, develop]

env:
  AWS_REGION: us-east-1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # JOB 1: Terraform lint + Checkov
  lint-terraform:
    name: Terraform Lint & Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del cÃ³digo
        uses: actions/checkout@v4

      - name: Notificar Inicio de Lint a Loki
        run: |
          TIMESTAMP=$(date +%s%N)
          BODY=$(jq -n --arg ts "$TIMESTAMP" --arg msg "[CI/CD] [START] Iniciando Terraform Lint & Security Scan..." '{"streams": [{"stream": {"env": "dev", "service": "github-actions", "event": "start"}, "values": [[$ts, $msg]]}]}')
          curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ">=1.6.0"

      - name: Terraform fmt (verifica formato)
        run: |
          terraform fmt -check -recursive > fmt.log 2>&1 || (
            TIMESTAMP=$(date +%s%N)
            ERR_TEXT=$(tail -n 15 fmt.log)
            BODY=$(jq -n --arg ts "$TIMESTAMP" --arg err "[CI/CD] [ERROR] Terraform formatting check failed:\n$ERR_TEXT" '{"streams": [{"stream": {"env": "dev", "service": "github-actions", "event": "failure"}, "values": [[$ts, $err]]}]}')
            curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push
            exit 1
          )
        working-directory: IAC

      - name: Terraform init (sin backend remoto)
        run: terraform init -backend=false
        working-directory: IAC

      - name: Terraform validate (valida sintaxis)
        run: |
          terraform validate > validate.log 2>&1 || (
            TIMESTAMP=$(date +%s%N)
            ERR_TEXT=$(tail -n 15 validate.log)
            BODY=$(jq -n --arg ts "$TIMESTAMP" --arg err "[CI/CD] [ERROR] Terraform validation failed:\n$ERR_TEXT" '{"streams": [{"stream": {"env": "dev", "service": "github-actions", "event": "failure"}, "values": [[$ts, $err]]}]}')
            curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push
            exit 1
          )
        working-directory: IAC

      - name: Checkov â€” Security Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: IAC
          config_file: IAC/.checkov.yaml
          output_format: cli
          soft_fail: true

      - name: Instalar promtool (Prometheus)
        run: |
          curl -sSLo prometheus.tar.gz https://github.com/prometheus/prometheus/releases/download/v2.51.0/prometheus-2.51.0.linux-amd64.tar.gz
          tar -xzf prometheus.tar.gz
          sudo mv prometheus-2.51.0.linux-amd64/promtool /usr/local/bin/
          rm -rf prometheus.tar.gz prometheus-2.51.0.linux-amd64

      - name: Validar prometheus.yml
        run: |
          promtool check config observability/prometheus/prometheus.yml > promtool.log 2>&1 || (
            TIMESTAMP=$(date +%s%N)
            ERR_TEXT=$(tail -n 15 promtool.log)
            BODY=$(jq -n --arg ts "$TIMESTAMP" --arg err "[CI/CD] [ERROR] Prometheus config validation failed:\n$ERR_TEXT" '{"streams": [{"stream": {"env": "dev", "service": "github-actions", "event": "failure"}, "values": [[$ts, $err]]}]}')
            curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push
            exit 1
          )

      - name: Notificar Exito de Lint a Loki
        if: success()
        run: |
          TIMESTAMP=$(date +%s%N)
          BODY=$(jq -n --arg ts "$TIMESTAMP" --arg msg "[CI/CD] [SUCCESS] Terraform Lint & Security Scan completado con Ã©xito." '{"streams": [{"stream": {"env": "dev", "service": "github-actions", "event": "success"}, "values": [[$ts, $msg]]}]}')
          curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push

      - name: Notificar Fallo de Lint a Loki
        if: failure()
        run: |
          TIMESTAMP=$(date +%s%N)
          BODY=$(jq -n --arg ts "$TIMESTAMP" --arg msg "[CI/CD] [ERROR] Terraform Lint & Security Scan fallÃ³. Revisa los logs en GitHub Actions." '{"streams": [{"stream": {"env": "dev", "service": "github-actions", "event": "failure"}, "values": [[$ts, $msg]]}]}')
          curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push

  # JOB 2: Build de los 4 microservicios backend
  build-backend:
    name: Build Backend â€” ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [anfitriona, mozo, caja, cocina]
    steps:
      - name: Checkout del cÃ³digo
        uses: actions/checkout@v4

      - name: Notificar Inicio de Build Backend a Loki
        run: |
          TIMESTAMP=$(date +%s%N)
          BODY=$(jq -n --arg ts "$TIMESTAMP" --arg msg "[CI/CD] [START] Iniciando compilaciÃ³n de backend para: ${{ matrix.service }}..." '{"streams": [{"stream": {"env": "dev", "service": "github-actions", "event": "start", "component": "backend", "microservice": "${{ matrix.service }}"}, "values": [[$ts, $msg]]}]}')
          curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagen â€” svc-${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: apps/backend/${{ matrix.service }}
          push: false
          tags: pardos-svc-${{ matrix.service }}:ci-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Notificar Exito de Build Backend a Loki
        if: success()
        run: |
          TIMESTAMP=$(date +%s%N)
          BODY=$(jq -n --arg ts "$TIMESTAMP" --arg msg "[CI/CD] [SUCCESS] CompilaciÃ³n exitosa para backend: ${{ matrix.service }}." '{"streams": [{"stream": {"env": "dev", "service": "github-actions", "event": "success", "component": "backend", "microservice": "${{ matrix.service }}"}, "values": [[$ts, $msg]]}]}')
          curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push

      - name: Notificar Fallo de Build Backend a Loki
        if: failure()
        run: |
          TIMESTAMP=$(date +%s%N)
          BODY=$(jq -n --arg ts "$TIMESTAMP" --arg msg "[CI/CD] [ERROR] FallÃ³ la compilaciÃ³n del backend: ${{ matrix.service }}." '{"streams": [{"stream": {"env": "dev", "service": "github-actions", "event": "failure", "component": "backend", "microservice": "${{ matrix.service }}"}, "values": [[$ts, $msg]]}]}')
          curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push

  # JOB 3: Build de los 2 frontends
  build-frontend:
    name: Build Frontend â€” ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [landing-page, reservation-system]
    steps:
      - name: Checkout del cÃ³digo
        uses: actions/checkout@v4

      - name: Notificar Inicio de Build Frontend a Loki
        run: |
          TIMESTAMP=$(date +%s%N)
          BODY=$(jq -n --arg ts "$TIMESTAMP" --arg msg "[CI/CD] [START] Iniciando compilaciÃ³n de frontend para: ${{ matrix.app }}..." '{"streams": [{"stream": {"env": "dev", "service": "github-actions", "event": "start", "component": "frontend", "app": "${{ matrix.app }}"}, "values": [[$ts, $msg]]}]}')
          curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagen â€” ${{ matrix.app }}
        uses: docker/build-push-action@v5
        with:
          context: apps/${{ matrix.app }}
          push: false
          tags: pardos-${{ matrix.app }}:ci-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

      - name: Notificar Exito de Build Frontend a Loki
        if: success()
        run: |
          TIMESTAMP=$(date +%s%N)
          BODY=$(jq -n --arg ts "$TIMESTAMP" --arg msg "[CI/CD] [SUCCESS] CompilaciÃ³n exitosa para frontend: ${{ matrix.app }}." '{"streams": [{"stream": {"env": "dev", "service": "github-actions", "event": "success", "component": "frontend", "app": "${{ matrix.app }}"}, "values": [[$ts, $msg]]}]}')
          curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push

      - name: Notificar Fallo de Build Frontend a Loki
        if: failure()
        run: |
          TIMESTAMP=$(date +%s%N)
          BODY=$(jq -n --arg ts "$TIMESTAMP" --arg msg "[CI/CD] [ERROR] FallÃ³ la compilaciÃ³n del frontend: ${{ matrix.app }}." '{"streams": [{"stream": {"env": "dev", "service": "github-actions", "event": "failure", "component": "frontend", "app": "${{ matrix.app }}"}, "values": [[$ts, $msg]]}]}')
          curl -H "Content-Type: application/json" -X POST -d "$BODY" https://efa5866d8i.execute-api.us-east-1.amazonaws.com/loki/api/v1/push
