global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'svc-anfitriona'
    static_configs:
      - targets: ['svc-anfitriona:8080']

  - job_name: 'svc-mozo'
    static_configs:
      - targets: ['svc-mozo:8080']

  - job_name: 'svc-caja'
    static_configs:
      - targets: ['svc-caja:8080']

  - job_name: 'svc-cocina'
    static_configs:
      - targets: ['svc-cocina:8080']
